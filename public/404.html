<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Skills021</title>
    <script>
      // GitHub Pages SPA trick: when GitHub serves this 404.html for an unknown path,
      // we store the intended URL in sessionStorage and redirect to the root index.html.
      // index.html then reads it and restores the URL via history.replaceState.
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem("redirect", window.location.origin + path);
      window.location.replace(window.location.origin + "/");
    </script>
  </head>
  <body></body>
</html>
